{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Watcher</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="navBar">
    <div class="container d-flex">
        <div class="navBarTitle">
            <a href="{% url 'home' %}" style="text-decoration: none;">Overtime Watcher</a>
        </div>
            <div class="navBarLinks">
                <!-- Navbar toggler for mobile view -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"><i class="fa-solid fa-bars"></i></span>
                    </button>
                        <nav id="nav">
                                <a href="{% url 'home' %}">Home</a>
                                {% if user.is_authenticated %}
                                    <a href="{% url 'dashboard' %}">Dashboard</a>
                                    <a href="{% url 'account_logout' %}">Logout</a>
                                {% else %}
                                    <a href="{% url 'account_login' %}">Login</a>
                                    <a href="{% url 'account_signup' %}">Sign up</a>
                                {% endif %}
                        </nav>
                <!-- End of Navbar Links -->
            </div>
    </div>
    <!-- The dropdown navigation for mobile view -->
    <div class="dropdownNav">
        <nav style="display: flex; flex-direction: column; justify-content: start; padding: 15px;">
            <a href="{% url 'home' %}">Home</a>
            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'account_logout' %}">Logout</a>
            {% else %}
            <a href="{% url 'account_login' %}">Login</a>
            <a href="{% url 'account_signup' %}">Sign up</a>
            {% endif %}
        </nav>
    </div>
    
    </header>

    <main>
        {% block content %}
        {% endblock %}
        <div style=" display: flex; height: 100vh;">
            <div style="flex-grow: 1;">
            </div>
        </div>
    </main>

    <footer class="navBar">
    <div class="container d-flex">
            <div class="navBarTitle">
                <p>2025 Overtime Watcher</p>
            </div>
    </div>
    </footer>

    <!-- Scripts -->
    <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
