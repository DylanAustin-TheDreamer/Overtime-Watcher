{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container" style="max-width:600px; margin:2rem auto; background:#fff; padding:1.5rem; border-radius:6px;">
  <h2>{% trans "Sign Up" %}</h2>
  <form method="post" action="{% url 'account_signup' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Sign Up" %}</button>
  </form>
  <p>
    <a href="{% url 'account_login' %}">{% trans "Already have an account? Log in" %}</a>
  </p>
</div>
{% endblock %}
